services:
  - type: web
    name: clawmaster
    runtime: image
    image:
      url: ghcr.io/clawmaster-org/clawmaster:0.10.18
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MOLTIS_NO_TLS
        value: "true"
      - key: MOLTIS_CONFIG_DIR
        value: /tmp/clawmaster/config
      - key: MOLTIS_DATA_DIR
        value: /tmp/clawmaster
      - key: MOLTIS_BEHIND_PROXY
        value: "true"
      - key: MOLTIS_DEPLOY_PLATFORM
        value: render
    dockerCommand: clawmaster --bind 0.0.0.0 --port 10000 --no-tls
