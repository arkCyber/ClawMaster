version: '3.8'

services:
  clawhub:
    build:
      context: ../..
      dockerfile: deployment/clawhub/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/data/clawhub.db
      - BIND_ADDR=0.0.0.0:8080
      - RUST_LOG=info
    volumes:
      - clawhub-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/clawhub/tools"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - clawhub
    restart: unless-stopped

volumes:
  clawhub-data:
    driver: local
