[package]
edition.workspace    = true
name                 = "clawmaster-web"
repository.workspace = true
version.workspace    = true

[dependencies]
askama          = { workspace = true }
axum            = { workspace = true }
axum-extra      = { features = ["cookie"], workspace = true }
base64          = { workspace = true }
chrono          = { features = ["serde"], workspace = true }
futures         = { workspace = true }
gix             = { workspace = true }
include_dir     = { optional = true, workspace = true }
clawmaster-channels = { workspace = true }
clawmaster-config   = { workspace = true }
clawmaster-cron     = { workspace = true }
clawmaster-gateway  = { workspace = true }
clawmaster-media    = { workspace = true }
clawmaster-skills   = { workspace = true }
clawmaster-tools    = { workspace = true }
portable-pty    = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
sysinfo         = { workspace = true }
thiserror       = { workspace = true }
tokio           = { workspace = true }
tokio-util      = { workspace = true }
tracing         = { workspace = true }
url             = { workspace = true }
uuid            = { workspace = true }
which           = { workspace = true }

[features]
agent              = ["clawmaster-gateway/agent"]
default            = ["embedded-assets"]
embedded-assets    = ["dep:include_dir"]
graphql            = []
metrics            = ["clawmaster-gateway/metrics"]
push-notifications = ["clawmaster-gateway/push-notifications"]
tailscale          = ["clawmaster-gateway/tailscale"]
vault              = ["clawmaster-gateway/vault"]
voice              = []

[lints]
workspace = true
