[package]
edition.workspace      = true
license.workspace      = true
name                   = "clawmaster-swift-bridge"
repository.workspace   = true
rust-version.workspace = true
version.workspace      = true

[lib]
crate-type = ["staticlib"]

[features]
default = ["metrics", "qmd", "tracing"]
metrics = ["dep:metrics"]
qmd     = ["clawmaster-gateway/qmd"]
tracing = ["dep:tracing"]

[dependencies]
anyhow                = { workspace = true }
axum                  = { workspace = true }
metrics               = { optional = true, workspace = true }
clawmaster-agents         = { workspace = true }
clawmaster-config         = { workspace = true }
clawmaster-gateway        = { default-features = true, features = ["file-watcher", "metrics", "voice", "web-ui"], workspace = true }
clawmaster-network-filter = { features = ["proxy", "service"], workspace = true }
clawmaster-projects       = { workspace = true }
clawmaster-provider-setup = { workspace = true }
clawmaster-providers      = { workspace = true }
clawmaster-sessions       = { workspace = true }
clawmaster-tools          = { features = ["embedded-wasm"], workspace = true }
clawmaster-web            = { workspace = true }
secrecy               = { workspace = true }
serde                 = { features = ["derive"], workspace = true }
serde_json            = { workspace = true }
sqlx                  = { workspace = true }
tokio                 = { workspace = true }
tokio-stream          = { workspace = true }
tracing               = { optional = true, workspace = true }
uuid                  = { workspace = true }

[dev-dependencies]
serial_test = { workspace = true }
