[package]
edition.workspace = true
name              = "clawmaster-tools"
version.workspace = true

[features]
default       = ["metrics", "wasm"]
embedded-wasm = []
metrics       = ["dep:clawmaster-metrics"]
wasm          = ["dep:shell-words", "dep:wasmtime", "dep:wasmtime-wasi", "wasmtime/component-model"]

[dependencies]
anyhow                = { workspace = true }
async-trait           = { workspace = true }
base64                = { workspace = true }
bytes                 = { workspace = true }
feed-rs               = "2.0"
futures               = { workspace = true }
glob                  = { workspace = true }
image                 = { workspace = true }
ipnet                 = { workspace = true }
clawmaster-agents         = { workspace = true }
clawmaster-browser        = { workspace = true }
clawmaster-common         = { workspace = true }
clawmaster-config         = { workspace = true }
clawmaster-cron           = { workspace = true }
clawmaster-metrics        = { optional = true, workspace = true }
clawmaster-network-filter = { workspace = true }
clawmaster-providers      = { workspace = true }
clawmaster-sessions       = { workspace = true }
clawmaster-skills         = { workspace = true }
regex                 = { workspace = true }
reqwest               = { features = ["blocking"], workspace = true }
scraper               = "0.20"
secrecy               = { workspace = true }
serde                 = { workspace = true }
serde_json            = { workspace = true }
sha2                  = { workspace = true }
shell-words           = { optional = true, workspace = true }
sqlx                  = { workspace = true }
thiserror             = { workspace = true }
time                  = { workspace = true }
tokio                 = { workspace = true }
tracing               = { workspace = true }
url                   = { workspace = true }
urlencoding           = "2.1"
uuid                  = { workspace = true }
wasmtime              = { optional = true, workspace = true }
wasmtime-wasi         = { optional = true, workspace = true }

[dev-dependencies]
mockito      = { workspace = true }
rstest       = { workspace = true }
tempfile     = { workspace = true }
tokio        = { features = ["macros", "rt-multi-thread"], workspace = true }
tokio-stream = { workspace = true }

[lints]
workspace = true
