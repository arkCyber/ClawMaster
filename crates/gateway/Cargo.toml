[package]
edition.workspace    = true
name                 = "clawmaster-gateway"
repository.workspace = true
version.workspace    = true

[dependencies]
anyhow                 = { workspace = true }
async-graphql          = { optional = true, workspace = true }
async-graphql-axum     = { optional = true, workspace = true }
async-trait            = { workspace = true }
axum                   = { workspace = true }
axum-extra             = { features = ["cookie"], workspace = true }
axum-server            = { optional = true, workspace = true }
base64                 = { workspace = true }
bytes                  = { workspace = true }
chrono                 = { features = ["serde"], optional = true, workspace = true }
chrono-tz              = { workspace = true }
ed25519-dalek          = { workspace = true }
hex                    = { workspace = true }
dashmap                = { workspace = true }
futures                = { workspace = true }
gix                    = { workspace = true }
hostname               = { workspace = true }
hyper                  = { optional = true, workspace = true }
hyper-util             = { optional = true, workspace = true }
include_dir            = { optional = true, workspace = true }
mdns-sd                = { optional = true, workspace = true }
clawmaster-agents          = { workspace = true }
clawmaster-audit-log       = { workspace = true }
clawmaster-auth            = { workspace = true }
clawmaster-backup-recovery = { workspace = true }
clawmaster-browser         = { workspace = true }
clawmaster-caldav          = { optional = true, workspace = true }
clawmaster-canvas          = { workspace = true }
clawmaster-channels        = { workspace = true }
clawmaster-chat            = { workspace = true }
clawmaster-common          = { workspace = true }
clawmaster-config          = { workspace = true }
clawmaster-config-validator = { workspace = true }
clawmaster-cron            = { workspace = true }
clawmaster-discord         = { workspace = true }
clawmaster-fault-recovery  = { workspace = true }
clawmaster-health-check    = { workspace = true }
clawmaster-input-validator = { workspace = true }
clawmaster-resource-quota  = { workspace = true }
clawmaster-graphql         = { optional = true, workspace = true }
clawmaster-mcp             = { workspace = true }
clawmaster-media           = { workspace = true }
clawmaster-memory          = { workspace = true }
clawmaster-metrics         = { optional = true, workspace = true }
clawmaster-msteams         = { workspace = true }
clawmaster-network-filter  = { features = ["proxy", "service"], optional = true, workspace = true }
clawmaster-oauth           = { workspace = true }
clawmaster-onboarding      = { workspace = true }
clawmaster-openclaw-import = { optional = true, workspace = true }
clawmaster-plugins         = { workspace = true }
clawmaster-projects        = { workspace = true }
clawmaster-protocol        = { workspace = true }
clawmaster-provider-setup  = { workspace = true }
clawmaster-providers       = { workspace = true }
clawmaster-qmd             = { optional = true, workspace = true }
clawmaster-routing         = { workspace = true }
clawmaster-service-traits  = { workspace = true }
clawmaster-sessions        = { workspace = true }
clawmaster-skills          = { workspace = true }
clawmaster-slack           = { optional = true, workspace = true }
clawmaster-tailscale       = { optional = true, workspace = true }
clawmaster-telegram        = { workspace = true }
clawmaster-tls             = { optional = true, workspace = true }
clawmaster-tools           = { workspace = true }
clawmaster-vault           = { optional = true, workspace = true }
clawmaster-voice           = { optional = true, workspace = true }
clawmaster-whatsapp        = { optional = true, workspace = true }
p256                   = { features = ["ecdsa"], optional = true, workspace = true }
portable-pty           = { optional = true, workspace = true }
pulldown-cmark         = { features = ["html"], workspace = true }
qrcode                 = { optional = true, workspace = true }
rand                   = { workspace = true }
rcgen                  = { optional = true, workspace = true }
reqwest                = { workspace = true }
rustls                 = { optional = true, workspace = true }
rustls-pemfile         = { optional = true, workspace = true }
secrecy                = { workspace = true }
serde                  = { workspace = true }
serde_json             = { workspace = true }
sha2                   = { workspace = true }
sqlx                   = { workspace = true }
sysinfo                = { workspace = true }
thiserror              = { workspace = true }
time                   = { workspace = true }
tokio                  = { workspace = true }
tokio-rustls           = { optional = true, workspace = true }
tokio-stream           = { workspace = true }
tokio-tungstenite      = { workspace = true }
tokio-util             = { workspace = true }
toml                   = { workspace = true }
tower                  = { optional = true, workspace = true }
tower-http             = { features = ["catch-panic", "compression-gzip", "compression-zstd", "cors", "limit", "request-id", "sensitive-headers", "set-header", "trace"], workspace = true }
tracing                = { workspace = true }
tracing-subscriber     = { workspace = true }
url                    = { workspace = true }
urlencoding            = { workspace = true }
uuid                   = { workspace = true }
web-push               = { optional = true, workspace = true }
webauthn-rs            = { features = ["danger-allow-state-serialisation"], workspace = true }
which                  = { optional = true, workspace = true }

[features]
agent = []
caldav = ["dep:clawmaster-caldav"]
default = [
  "agent",
  "caldav",
  "file-watcher",
  "graphql",
  "local-llm",
  "local-llm-metal",
  "mdns",
  "metrics",
  "openclaw-import",
  "prometheus",
  "push-notifications",
  "qmd",
  "slack",
  "tailscale",
  "tls",
  "trusted-network",
  "vault",
  "voice",
  "wasm",
  "web-ui",
  "whatsapp",
]
file-watcher = [
  "clawmaster-memory/file-watcher",
  "clawmaster-openclaw-import?/file-watcher",
  "clawmaster-skills/file-watcher",
]
graphql = ["dep:async-graphql", "dep:async-graphql-axum", "dep:clawmaster-graphql"]
local-embeddings = ["clawmaster-memory/local-embeddings"]
local-llm = [
  "clawmaster-chat/local-llm",
  "clawmaster-provider-setup/local-llm",
  "clawmaster-providers/local-llm",
]
local-llm-cuda = ["local-llm", "clawmaster-providers/local-llm-cuda"]
local-llm-metal = ["local-llm", "clawmaster-providers/local-llm-metal"]
mdns = ["dep:mdns-sd"]
metrics = [
  "dep:clawmaster-metrics",
  "clawmaster-chat/metrics",
  "clawmaster-discord/metrics",
  "clawmaster-metrics/sqlite",
  "clawmaster-msteams/metrics",
]
openclaw-import = ["dep:clawmaster-openclaw-import"]
prometheus = ["metrics", "clawmaster-metrics/prometheus"]
push-notifications = ["dep:chrono", "dep:p256", "dep:web-push", "clawmaster-chat/push-notifications"]
qmd = ["dep:clawmaster-qmd"]
slack = ["dep:clawmaster-slack", "clawmaster-slack/metrics"]
tailscale = ["dep:clawmaster-tailscale"]
tls = [
  "dep:axum-server",
  "dep:hyper",
  "dep:hyper-util",
  "dep:clawmaster-tls",
  "dep:rcgen",
  "dep:rustls",
  "dep:rustls-pemfile",
  "dep:tokio-rustls",
  "dep:tower",
]
trusted-network = ["dep:clawmaster-network-filter"]
vault = ["dep:clawmaster-vault", "clawmaster-auth/vault"]
voice = ["dep:clawmaster-voice"]
wasm = ["clawmaster-tools/wasm"]
web-ui = ["dep:include_dir", "dep:portable-pty", "dep:which", "clawmaster-chat/web-ui"]
whatsapp = ["dep:clawmaster-whatsapp", "dep:qrcode", "clawmaster-whatsapp/metrics"]

[dev-dependencies]
clawmaster-web        = { workspace = true }
reqwest           = { workspace = true }
sqlx              = { workspace = true }
tempfile          = { workspace = true }
tokio-tungstenite = { workspace = true }

[lints]
workspace = true
