[package]
name = "clawmaster-lightweight-deploy"
version = { workspace = true }
edition = { workspace = true }

[[bin]]
name = "clawmaster-lite"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
url = "2.5"
dirs = "5.0"

# Core clawmaster dependencies (minimal set)
clawmaster-common = { workspace = true }
clawmaster-config = { workspace = true }
clawmaster-gateway = { workspace = true, optional = true }
clawmaster-web = { workspace = true, optional = true }

[features]
default = ["web", "gateway"]
web = ["clawmaster-web"]
gateway = ["clawmaster-gateway"]
minimal = []
all = ["web", "gateway"]

[lints]
workspace = true
