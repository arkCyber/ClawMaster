[package]
name = "clawmaster-input-validator"
version = "0.10.18"
edition = "2021"
authors = ["ClawMaster Team"]
description = "Input validation and sanitization - DO-178C Level A compliant"
license = "MIT OR Apache-2.0"

[dependencies]
anyhow = { workspace = true }
thiserror = { workspace = true }
regex = "1.10"
once_cell = "1.19"
serde_json = { workspace = true }

# HTML/XML encoding
html-escape = "0.2"

# URL encoding
percent-encoding = "2.3"

[dev-dependencies]
# No additional dev dependencies needed

[features]
default = []
