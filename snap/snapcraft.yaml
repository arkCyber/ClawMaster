name: clawmaster
version: '0.2.0'
summary: Personal AI gateway inspired by OpenClaw
description: |
  Moltis is a personal AI gateway inspired by OpenClaw. One binary, multiple LLM providers.

base: core24
grade: stable
confinement: strict

platforms:
  amd64:
  arm64:

apps:
  clawmaster:
    command: bin/clawmaster
    environment:
      MOLTIS_SHARE_DIR: $SNAP/share/clawmaster
    plugs:
      - network
      - network-bind

parts:
  clawmaster:
    plugin: rust
    source: .
    rust-path: ["crates/cli"]
    build-packages:
      - pkg-config
      - libssl-dev
      - cmake
      - build-essential
      - libclang-dev
      - git
      - curl
    override-build: |
      ARCH=$(uname -m)
      case "$ARCH" in x86_64) TW="tailwindcss-linux-x64";; aarch64) TW="tailwindcss-linux-arm64";; esac
      curl -sLO "https://github.com/tailwindlabs/tailwindcss/releases/latest/download/$TW"
      chmod +x "$TW"
      cd crates/web/ui && TAILWINDCSS="../../../$TW" ./build.sh && cd ../../..
      rustup target add wasm32-wasip2
      cargo build --target wasm32-wasip2 -p clawmaster-wasm-calc -p clawmaster-wasm-web-fetch -p clawmaster-wasm-web-search --release
      craftctl default
      mkdir -p "$CRAFT_PART_INSTALL/share/clawmaster/web" "$CRAFT_PART_INSTALL/share/clawmaster/wasm"
      cp -R "crates/web/src/assets/." "$CRAFT_PART_INSTALL/share/clawmaster/web/"
      cp "target/wasm32-wasip2/release/clawmaster_wasm_calc.wasm" "$CRAFT_PART_INSTALL/share/clawmaster/wasm/"
      cp "target/wasm32-wasip2/release/clawmaster_wasm_web_fetch.wasm" "$CRAFT_PART_INSTALL/share/clawmaster/wasm/"
      cp "target/wasm32-wasip2/release/clawmaster_wasm_web_search.wasm" "$CRAFT_PART_INSTALL/share/clawmaster/wasm/"
